<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>InstaScan - Manual Instagram Fake Account Detector</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f7f9fc;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: 50px auto;
      background: #fff;
      padding: 25px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input, textarea {
      padding: 10px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 100%;
    }

    label {
      font-weight: 600;
      color: #333;
    }

    .checkboxes {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: #0056b3;
    }

    #profilePreview {
      display: none;
      text-align: center;
      margin: 10px 0;
    }

    #profilePreview img {
      max-width: 120px;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    #result {
      margin-top: 20px;
      text-align: center;
      font-size: 1.2em;
      font-weight: bold;
    }

    .real {
      color: green;
    }

    .fake {
      color: red;
    }

  </style>
</head>
<body>
  <div class="container">
    <h2>InstaScan - Manual Entry</h2>

    <form id="manualForm">
      <label>Username:</label>
      <input type="text" name="username" required>

      <label>Full Name:</label>
      <input type="text" name="full_name" required>

      <label>Biography:</label>
      <textarea name="biography" rows="2" placeholder="Short bio..."></textarea>

      <label>External URL:</label>
      <input type="text" name="external_url" placeholder="https://example.com">

      <label>Profile Picture URL:</label>
      <input type="text" name="profile_pic_url" id="profilePicInput" placeholder="Paste image URL">
      <div id="profilePreview">
        <img id="profileImg" src="" alt="Profile Picture Preview">
      </div>

      <div class="checkboxes">
        <label><input type="checkbox" name="is_private"> Private</label>
        <label><input type="checkbox" name="is_verified"> Verified</label>
      </div>

      <label>Number of Posts:</label>
      <input type="number" name="posts" required>

      <label>Number of Followers:</label>
      <input type="number" name="followers" required>

      <label>Number of Following:</label>
      <input type="number" name="follows" required>

      <button type="submit">Predict</button>
    </form>

    <div id="result"></div>
  </div>

  <script>
    // Preview profile picture if a URL is entered
    const profileInput = document.getElementById("profilePicInput");
    const previewDiv = document.getElementById("profilePreview");
    const previewImg = document.getElementById("profileImg");

    profileInput.addEventListener("input", () => {
      const url = profileInput.value.trim();
      if (url) {
        previewImg.src = url;
        previewDiv.style.display = "block";
      } else {
        previewDiv.style.display = "none";
      }
    });

    // Handle form submission
    document.getElementById("manualForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const formData = new FormData(this);

      try {
        const response = await fetch("/predict_manual", {
          method: "POST",
          body: formData
        });

        const data = await response.json();
        const resultDiv = document.getElementById("result");

        if (data.result) {
          const cls = data.result === "Fake Account" ? "fake" : "real";
          resultDiv.innerHTML = `Prediction: <span class="${cls}">${data.result}</span>`;
        } else {
          resultDiv.textContent = data.error || "Prediction failed.";
        }
      } catch (err) {
        document.getElementById("result").textContent = "Server error: " + err.message;
      }
    });
  </script>
</body>
</html>
