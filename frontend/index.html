<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>InstaScan — Simple</title>
  <style>
    :root{
      --bg:#f6f8fb; --card:#fff; --accent:#6b21a8; --danger:#b91c1c; --muted:#6b7280;
    }
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;}
    body{display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
    .card{width:100%;max-width:540px;background:var(--card);padding:28px;border-radius:12px;box-shadow:0 6px 30px rgba(11,15,30,0.08);text-align:center;}
    h1{margin:0 0 10px;font-size:20px;color:var(--accent)}
    p.lead{margin:0 0 18px;color:var(--muted);font-size:14px}
    input[type="text"]{width:100%;padding:12px 14px;border-radius:8px;border:1px solid #e6e9ef;font-size:15px;outline:none;}
    .row{display:flex;gap:8px;margin-top:12px;}
    button{background:var(--accent);color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:600;}
    button[disabled]{opacity:.6;cursor:not-allowed}
    .result{margin-top:18px;font-size:18px;font-weight:700;min-height:36px;display:flex;align-items:center;justify-content:center}
    .result.real{color: #059669} /* green */
    .result.fake{color: var(--danger)}
    .error{color:var(--danger);font-weight:600}
    .hint{margin-top:10px;color:var(--muted);font-size:13px}
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:inline-block;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="card" role="main" aria-labelledby="title">
    <h1 id="title">InstaScan — Quick Check</h1>
    <p class="lead">Paste an Instagram profile URL and click Predict — shows only Real or Fake.</p>

    <label for="url" class="sr-only">Instagram URL</label>
    <input id="url" type="text" placeholder="https://www.instagram.com/username" autocomplete="off" />

    <div class="row">
      <button id="predictBtn" type="button">Predict</button>
      <button id="clearBtn" type="button" style="background:#e6e9ef;color:#111">Clear</button>
    </div>

    <div id="result" class="result" aria-live="polite"></div>
    <div id="hint" class="hint">Only outputs "Real Account" or "Fake Account".</div>
  </div>

  <script>
    (function(){
      const urlEl = document.getElementById('url');
      const btn = document.getElementById('predictBtn');
      const clearBtn = document.getElementById('clearBtn');
      const resultEl = document.getElementById('result');

      // Enter triggers
      urlEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); run(); } });
      btn.addEventListener('click', run);
      clearBtn.addEventListener('click', () => {
        urlEl.value = ''; resultEl.textContent = ''; resultEl.className = 'result'; urlEl.focus();
      });

      async function run(){
        const url = urlEl.value.trim();
        resultEl.className = 'result';
        resultEl.textContent = '';

        if (!url) { showError('Please enter an Instagram profile URL'); return; }
        if (!url.includes('instagram.com')) { showError('Please enter a valid Instagram URL'); return; }

        // set loading
        btn.disabled = true;
        const original = btn.textContent;
        btn.innerHTML = '<span class="spinner" aria-hidden="true"></span>Analyzing...';

        try {
          const res = await fetch('/api/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url })
          });

          if (!res.ok) {
            showError('Server error. Try again.');
            return;
          }

          const data = await res.json();

          if (data && typeof data.result === 'string') {
            // Normalize decision text; keep it simple
            const txt = data.result.toLowerCase();
            if (txt.includes('fake') || txt.includes('fraud') || txt.includes('bot') || txt.includes('suspicious')) {
              showDecision('Fake Account', 'fake');
            } else {
              showDecision('Real Account', 'real');
            }
          } else if (data && data.error) {
            showError(data.error);
          } else {
            showError('Unexpected response from server.');
          }
        } catch (err) {
          console.error(err);
          showError('Could not connect to backend.');
        } finally {
          btn.disabled = false;
          btn.innerHTML = original;
        }
      }

      function showDecision(text, cls) {
        resultEl.className = 'result ' + cls;
        resultEl.textContent = (cls === 'real' ? '✓ ' : '⚠️ ') + text;
      }

      function showError(msg) {
        resultEl.className = 'result error';
        resultEl.textContent = '⚠️ ' + msg;
      }
    })();
  </script>
</body>
</html>
